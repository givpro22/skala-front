<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="SKALA-FRONT 회원가입 폼">
    <link rel="stylesheet" href="../css/style.css">
    <script src="../js/common.js"></script>
    <script src="../js/signup.js"></script>
    <title>회원가입</title>
</head>
<body>
    <header class="topbar">
        <div class="brand">SKALA<span>·</span>FRONT</div>
        <nav>
            <a href="index.html">홈</a>
            <a href="myProfile.html">소개</a>
            <a href="myClass.html">시간표</a>
            <a href="holiday.html">휴일</a>
            <a href="myTrip.html">여행</a>
            <a href="signUp.html">회원가입</a>
        </nav>
        <button class="theme-toggle" onclick="toggleTheme()" aria-label="테마 전환">🌙</button>
    </header>

    <div class="container">
        <h1>👤 회원가입</h1>
        <p>SKALA-FRONT 회원가입을 환영합니다. 입력하는 즉시 실시간으로 검증됩니다.</p>

        <form action="signUpResult.html" method="get" id="signupForm">
            <fieldset>
                <legend>계정 정보</legend>
                <p>
                    <label for="userId">아이디 <small>(필수)</small></label><br>
                    <input type="text" id="userId" name="userId" minlength="4" maxlength="15"
                           required placeholder="4~15자 영문/숫자" autocomplete="username">
                    <span class="field-msg" id="idMsg"></span>
                </p>
                <p>
                    <label for="userPw">비밀번호 <small>(필수)</small></label><br>
                    <input type="password" id="userPw" name="userPw" minlength="8"
                           required placeholder="8자 이상 입력" autocomplete="new-password">
                    <button type="button" class="pw-toggle" id="pwToggle" aria-label="비밀번호 표시">👁️</button>
                    <span class="strength"><span class="strength-bar" id="strengthBar"></span></span>
                    <span class="field-msg" id="pwMsg"></span>
                </p>
                <p>
                    <label for="userEmail">이메일</label><br>
                    <input type="text" id="userEmail" name="userEmail" placeholder="example">
                    @
                    <input type="text" id="emailDomainInput" name="emailDomainInput"
                           placeholder="직접 입력" style="width:150px;">
                    <select id="emailDomain" name="emailDomain">
                        <option value="direct">직접 입력</option>
                        <option value="naver.com">naver.com</option>
                        <option value="gmail.com">gmail.com</option>
                        <option value="daum.net">daum.net</option>
                    </select>
                </p>
            </fieldset>

            <fieldset>
                <legend>개인 프로필 정보</legend>
                <p>
                    <label for="userName">이름 <small>(필수)</small></label><br>
                    <input type="text" id="userName" name="userName" required>
                </p>
                <p>
                    <label for="userBirth">생년월일</label><br>
                    <input type="date" id="userBirth" name="userBirth">
                </p>
                <p>
                    성별:
                    <label><input type="radio" name="gender" value="male" checked> 남성</label>
                    <label><input type="radio" name="gender" value="female"> 여성</label>
                    <label><input type="radio" name="gender" value="none"> 선택안함</label>
                </p>
                <p>
                    관심 분야 (중복 선택 가능):<br>
                    <label><input type="checkbox" name="interest" value="frontend"> 웹 프론트엔드 (Vue.js/HTML)</label><br>
                    <label><input type="checkbox" name="interest" value="uiux"> UI/UX 디자인 표준</label><br>
                    <label><input type="checkbox" name="interest" value="backend"> 백엔드 &amp; 데이터베이스</label><br>
                    <label><input type="checkbox" name="interest" value="devops"> 클라우드 &amp; 인프라</label>
                </p>
                <p>
                    <label for="route">가입 경로</label><br>
                    <select id="route" name="route">
                        <option value="">-- 선택해 주세요 --</option>
                        <option value="search">검색</option>
                        <option value="friend">지인 추천</option>
                        <option value="sns">SNS</option>
                    </select>
                </p>
            </fieldset>

            <fieldset>
                <legend>자기소개</legend>
                <p>
                    <label for="intro">나를 표현하는 한 줄 소개 또는 가입 인사</label><br>
                    <textarea id="intro" name="intro" rows="5"
                              placeholder="여기에 내용을 입력하세요 (최대 200자)"></textarea>
                    <span class="char-count" id="charCount">0 / 200자</span>
                </p>
            </fieldset>

            <div class="btn-row">
                <input type="submit" value="동의하고 회원가입">
                <input type="reset" value="다시 작성">
            </div>
        </form>
    </div>

    <button class="to-top" aria-label="맨 위로">↑</button>
</body>
</html>
