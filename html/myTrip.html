<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../css/style.css">
    <title>나의 여행지</title>
</head>
<body>
    <div class="container">
    <h1>&#127758; 나의 여행 앨범 &#127925;</h1>

    <!-- 배경 음악: media 폴더에 travel-music.mp3 파일을 넣어주세요 -->
    <audio controls>
        <source src="media/travel-music.mp3" type="audio/mpeg">
        <source src="media/travel-music.ogg" type="audio/ogg">
        브라우저가 audio 요소를 지원하지 않습니다.
    </audio>

    <figure class="trip-card">
        <img src="media/trip1.jpg" alt="리장 호도협" style="width:400px;">
        <figcaption>리장 호도협 (2025년)</figcaption>
    </figure>

    <figure class="trip-card">
        <img src="media/trip2.jpg" alt="세부 탑스힐" style="width:400px;">
        <figcaption>세부 탑스힐 (2024년)</figcaption>
    </figure>

    <figure class="trip-card">
        <img src="media/trip3.jpg" alt="홋카이도 대설산" style="width:400px;">
        <figcaption>홋카이도 대설산 (2025년)</figcaption>
    </figure>

    <h2>&#128250; 나의 여행 브이로그</h2>
    <!-- 영상: media 폴더에 trip-vlog.mp4 파일을 넣어주세요 -->
    <video controls width="400">
        <source src="media/trip-vlog.mp4" type="video/mp4">
        <source src="media/trip-vlog.ogg" type="video/ogg">
        브라우저가 video 요소를 지원하지 않습니다.
    </video>
    <p>리장의 아름다운 음악 &#127925;</p>
    </div>
</body>
</html>
